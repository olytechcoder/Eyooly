version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eyooly
      POSTGRES_USER: eyooly_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eyooly_user -d eyooly"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Eyooly Next.js app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://eyooly_user:${POSTGRES_PASSWORD:-change_this_password}@db:5432/eyooly
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-Eyooly <noreply@eyooly.com>}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-auto}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

  # Database migration runner (runs once, then exits)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://eyooly_user:${POSTGRES_PASSWORD:-change_this_password}@db:5432/eyooly
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
